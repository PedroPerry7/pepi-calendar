<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pepi 25-26">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>Pepi — Circuit 2025·2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#111625;--bg3:#1a2035;--bg4:#202840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --gold:#e4c060;--gold2:#f0d080;
  --text:#e8eaf0;--muted:#6a7290;--muted2:#8a94b0;
  --major:#e85d75;--p1:#e87d3a;--p2:#e8b53a;
  --platinum:#7ecfff;--gold-t:#4ec4a0;--silver:#90a0c0;--bronze:#c07840;
  --fpp:#a07af0;--nat:#60b87a;--champ:#e060c0;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100svh;overscroll-behavior:none}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 14px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);line-height:1}
.logo span{color:var(--muted2);font-size:12px;font-family:'DM Mono',monospace;display:block;letter-spacing:1px;margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-icon{background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.btn-icon:active{transform:scale(0.93);background:var(--bg4)}
.btn-icon svg{width:16px;height:16px}
.btn-refresh.spinning svg{animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.year-tabs{display:flex;gap:6px;margin-bottom:8px}
.year-tab{flex:1;padding:6px 0;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center}
.year-tab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500}
.filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:8px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.filter-btn.active{color:#000;border-color:transparent;font-weight:500}
.filter-btn[data-f="all"].active{background:var(--gold);color:#000}
.filter-btn[data-f="starred"].active{background:#e85d75;color:#fff}
.filter-btn[data-f="confirmado"].active{background:var(--gold-t);color:#000}
.filter-btn[data-f="major"].active{background:var(--major);color:#fff}
.filter-btn[data-f="p1"].active{background:var(--p1);color:#fff}
.filter-btn[data-f="p2"].active{background:var(--p2);color:#000}
.filter-btn[data-f="platinum"].active{background:var(--platinum);color:#000}
.filter-btn[data-f="gold"].active{background:var(--gold-t);color:#000}
.filter-btn[data-f="silver"].active{background:var(--silver);color:#000}
.filter-btn[data-f="bronze"].active{background:var(--bronze);color:#fff}
.filter-btn[data-f="fpp"].active{background:var(--fpp);color:#fff}
.filter-btn[data-f="por"].active{background:#c84040;color:#fff}
/* week nav */
.week-nav{display:flex;align-items:center;gap:6px;padding:6px 0 2px}
.week-nav-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px}
.week-nav-btn:active{background:var(--bg4)}
.week-label{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);cursor:pointer}
.week-label.active-week{color:var(--gold);font-weight:500}
.week-clear{background:none;border:1px solid var(--border2);color:var(--muted2);padding:3px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;flex-shrink:0}
.week-clear.on{color:var(--gold);border-color:rgba(228,192,96,0.4)}
.stats-bar{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;text-align:center;padding:7px 12px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1;color:var(--gold)}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}
.search-wrap{padding:8px 12px 0;position:relative}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 14px 8px 34px;outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.content{padding:8px 10px calc(var(--safe-bottom) + 80px)}
.month-group{margin-bottom:4px}
.month-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);padding:12px 4px 5px;position:sticky;top:calc(var(--safe-top) + 180px);background:var(--bg);z-index:10;display:flex;align-items:center;gap:8px}
.month-label .wk-range{color:var(--muted2)}
.month-label .wk-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);font-weight:normal;letter-spacing:0}
.t-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:6px;overflow:hidden;transition:border-color 0.2s}
.t-card.is-starred{border-color:rgba(228,192,96,0.35)}
.t-card.is-past{opacity:0.32}
.t-card.is-custom{border-style:dashed}
.t-main{display:flex;align-items:stretch;cursor:pointer;padding:10px 12px;gap:10px;position:relative}
.t-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;margin:-10px 0 -10px -12px}
.t-date-col{flex-shrink:0;text-align:center;min-width:36px}
.t-day{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}
.t-mon{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase}
.t-info{flex:1;min-width:0}
.t-name{font-weight:500;font-size:13px;line-height:1.3;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-loc{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:3px;margin-bottom:3px}
.t-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.badge-major{background:rgba(232,93,117,0.18);color:var(--major)}
.badge-p1{background:rgba(232,125,58,0.18);color:var(--p1)}
.badge-p2{background:rgba(232,181,58,0.18);color:var(--p2)}
.badge-platinum{background:rgba(126,207,255,0.13);color:var(--platinum)}
.badge-gold{background:rgba(78,196,160,0.13);color:var(--gold-t)}
.badge-silver{background:rgba(144,160,192,0.13);color:var(--silver)}
.badge-bronze{background:rgba(192,120,64,0.18);color:var(--bronze)}
.badge-fpp{background:rgba(160,122,240,0.18);color:var(--fpp)}
.badge-nat{background:rgba(96,184,122,0.15);color:var(--nat)}
.badge-champ{background:rgba(224,96,192,0.15);color:var(--champ)}
.badge-pts{background:rgba(228,192,96,0.1);color:var(--gold)}
.badge-go{background:rgba(78,196,160,0.18);color:var(--gold-t)}
.badge-maybe{background:rgba(232,181,58,0.15);color:var(--p2)}
.badge-no{background:rgba(106,114,144,0.15);color:var(--muted2)}
.badge-partner{background:rgba(228,192,96,0.08);color:var(--gold);border:1px solid rgba(228,192,96,0.2)}
.badge-por{background:rgba(200,64,64,0.18);color:#e07070}
.badge-custom{background:rgba(160,122,240,0.1);color:var(--fpp);border:1px dashed rgba(160,122,240,0.3)}
.t-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:4px}
.star-btn{background:none;border:none;cursor:pointer;padding:2px;color:var(--muted);font-size:16px;line-height:1;transition:color 0.15s,transform 0.15s}
.star-btn.on{color:var(--gold)}
.star-btn:active{transform:scale(1.3)}
.t-daterange{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:right;line-height:1.5}
.t-expanded{display:none;border-top:1px solid var(--border);background:var(--bg3);padding:12px}
.t-card.open .t-expanded{display:block}
.t-card.open .t-main{background:rgba(255,255,255,0.015)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.exp-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.exp-select,.exp-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.exp-select:focus,.exp-input:focus{border-color:var(--gold)}
.exp-select option{background:var(--bg2)}
.dates-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.date-pill{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 8px}
.date-pill.qual{border-color:rgba(126,207,255,0.25)}
.date-pill.qual .dp-lbl{color:var(--platinum)}
.date-pill.draw{border-color:rgba(232,181,58,0.25)}
.date-pill.draw .dp-lbl{color:var(--p2)}
.dp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px}
.dp-val{font-size:12px;font-weight:500}
.exp-notes{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;resize:none;min-height:48px;transition:border-color 0.15s;margin-top:4px}
.exp-notes:focus{border-color:var(--gold)}
.exp-notes::placeholder{color:var(--muted)}
.exp-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.btn-edit,.btn-del{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-edit:active{background:var(--bg4)}
.btn-del{color:#e07070;border-color:rgba(224,112,112,0.25)}
.btn-del:active{background:rgba(224,112,112,0.1)}
.fab{position:fixed;bottom:calc(var(--safe-bottom)+20px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(228,192,96,0.35);z-index:50;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}
.fab svg{width:22px;height:22px;color:#000}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px 16px calc(var(--safe-bottom)+20px);width:100%;max-height:92svh;overflow-y:auto;transform:translateY(40px);transition:transform 0.25s cubic-bezier(0.34,1.2,0.64,1)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;padding:2px;line-height:1}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-field{margin-bottom:0}
.modal-field.full{grid-column:1/-1}
.modal-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.modal-input,.modal-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.modal-input:focus,.modal-select:focus{border-color:var(--gold)}
.modal-select option{background:var(--bg3)}
.btn-save{width:100%;padding:13px;background:var(--gold);border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;transition:opacity 0.15s}
.btn-save:active{opacity:0.85}
.sync-row{display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync-dot.synced{background:var(--gold-t)}
.sync-dot.syncing{background:var(--p2);animation:pulse 1s infinite}
.sync-dot.error{background:var(--major)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.toast{position:fixed;bottom:calc(var(--safe-bottom)+80px);left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 16px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;transition:transform 0.28s cubic-bezier(0.34,1.3,0.64,1);z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty big{font-family:'Bebas Neue',sans-serif;font-size:36px;display:block;margin-bottom:6px;color:var(--border2)}
.confirm-box{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.15s}
.confirm-box.show{opacity:1;pointer-events:all}
.confirm-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;max-width:300px;width:100%;text-align:center}
.confirm-inner p{font-size:14px;color:var(--text);margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.confirm-btns .btn-confirm-del{background:rgba(200,64,64,0.2);color:#e07070;border-color:rgba(200,64,64,0.3)}
 
/* RESULTS */
.res-section{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.res-section-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.res-partner-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.res-prize-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.res-prize-row label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.res-prize-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 9px;outline:none}
.res-prize-input:focus{border-color:var(--gold)}
.badge-prize{background:rgba(228,192,96,0.12);color:var(--gold);border:1px solid rgba(228,192,96,0.25)}
.res-partner-row label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.res-partner-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 9px;outline:none}
.res-partner-input:focus{border-color:var(--gold)}
.rounds-list{display:flex;flex-direction:column;gap:5px}
.round-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.round-row.has-result{border-color:rgba(228,192,96,0.25)}
.round-row.is-win{border-left:3px solid var(--gold-t)}
.round-row.is-loss{border-left:3px solid var(--major)}
.round-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.round-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--gold);min-width:52px}
.round-label.qual-round{color:var(--platinum)}
.round-result-display{flex:1;font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}
.round-edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px}
.round-edit-btn:active{color:var(--gold)}
.round-inputs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
.round-input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;outline:none;width:100%}
.round-input:focus{border-color:var(--gold)}
.round-input::placeholder{color:var(--muted);font-size:11px}
.round-input.full{grid-column:1/-1}
.round-save-btn{grid-column:1/-1;background:var(--gold);border:none;border-radius:6px;color:#000;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px;cursor:pointer;margin-top:2px}
.round-save-btn:active{opacity:0.85}
.round-sep{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding:4px 4px 0;letter-spacing:1px}
 
/* SEARCH PAGE */
.search-page{position:fixed;inset:0;background:var(--bg);z-index:150;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.1,0.64,1)}
.search-page.show{transform:translateY(0)}
.search-page-header{padding:calc(var(--safe-top)+14px) 14px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.search-page-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;flex:1}
.search-page-close{background:none;border:none;color:var(--muted2);font-size:22px;cursor:pointer;padding:2px}
.search-page-input-wrap{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-page-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 14px;outline:none}
.search-page-input:focus{border-color:var(--gold)}
.search-results{flex:1;overflow-y:auto;padding:10px 12px calc(var(--safe-bottom)+20px)}
.opp-group{margin-bottom:16px}
.opp-name{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;padding:0 2px}
.opp-match{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:5px}
.opp-match.win{border-left:3px solid var(--gold-t)}
.opp-match.loss{border-left:3px solid var(--major)}
.opp-match-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.opp-match-tourn{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}

const POR_CC=new Set(['POR']);
function isPOR(t){return POR_CC.has(t.country);}
function d(ds){if(!ds)return'—';const x=new Date(ds+'T12:00:00');return `${x.getDate()} ${MONTHS[x.getMonth()]}`;}
function startDay(ds){return new Date(ds+'T12:00:00').getDate();}
function startMon(ds){return MONTHS[new Date(ds+'T12:00:00').getMonth()];}
function getMonthIdx(ds){return new Date(ds+'T12:00:00').getMonth();}
function isPast(t){return new Date(t.dateEnd+'T23:59:59')<new Date();}
function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
// Week helpers
function getMonday(date){const d=new Date(date);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d;}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmtWeek(mon){const sun=addDays(mon,6);return `${mon.getDate()} ${MONTHS[mon.getMonth()]} — ${sun.getDate()} ${MONTHS[sun.getMonth()]}`;}
function tournamentInWeek(t,mon){
  const wEnd=addDays(mon,7);
  const tStart=new Date(t.dateStart+'T00:00:00');
  const tEnd=new Date(t.dateEnd+'T23:59:59');
  return tStart<wEnd && tEnd>=mon;
}

  if(body) opts.body=JSON.stringify(body);

  const r=await fetch(method==='GET'?url+'?select=*&order=updated_at.desc&limit=1':url, opts);
  if(!r.ok) throw new Error('Supabase '+r.status);

// Relevance order for sorting within a week
const TIER_RANK={champ:1,nat:2,p1:3,major:4,p2:5,platinum:6,gold:7,silver:8,bronze:9,fpp:10};
function tierRank(t){
  // champ = world/euro championships (tier=champ)
  // nat = campeonato nacional absolutos FPP
  // Special: FIP Masters Finals / Premier Finals (name contains Finals)
  if(t.tier==='champ') return 1;
  if(t.tier==='nat') return 2;
  if(t.name.toLowerCase().includes('finals')) return 3;
  if(t.tier==='major') return 4;
  if(t.tier==='p1') return 5;
  if(t.tier==='p2') return 6;
  if(t.tier==='platinum') return 7;
  if(t.tier==='gold') return 8;
  if(t.tier==='silver') return 9;
  if(t.tier==='bronze') return 10;
  // FPP: sort by prize money descending (higher pts = more important)
  // We use pts field; FPP tournaments with higher prize = lower rank number
  if(t.tier==='fpp'){
    // Map prize to rank: 50000->11, 25000->12, 18000->13, 10000->14, 5000->15, 2000->16, 0->17
    const pm = t.pts || 0;
    if(pm>=50000) return 11;
    if(pm>=25000) return 12;
    if(pm>=18000) return 13;
    if(pm>=10000) return 14;
    if(pm>=5000)  return 15;
    if(pm>=2000)  return 16;
    return 17;
  }
  return 18;
}
 
function getWeekKey(dateEnd){
  // Week is determined by the Monday of the week the end date falls in
  const mon = getMonday(new Date(dateEnd+'T12:00:00'));
  return mon.toISOString().slice(0,10);
}
 
function fmtWeekGroup(weekKey){
  const mon = new Date(weekKey+'T12:00:00');
  const sun = addDays(mon,6);
  const sameMon = mon.getMonth()===sun.getMonth();
  if(sameMon){
    return `${mon.getDate()}–${sun.getDate()} ${MONTHS[mon.getMonth()].toUpperCase()} ${mon.getFullYear()}`;
  }
  return `${mon.getDate()} ${MONTHS[mon.getMonth()].toUpperCase()} – ${sun.getDate()} ${MONTHS[sun.getMonth()].toUpperCase()} ${sun.getFullYear()}`;
}
 
function renderList(){
  const list=filteredList();
  const el=document.getElementById('mainContent');
  if(!list.length){el.innerHTML='<div class="empty"><big>🎾</big>Nenhum torneio encontrado</div>';return;}
  
  // Group by week of end date
  const byWeek={};
  list.forEach(t=>{
    const wk=getWeekKey(t.dateEnd);
    if(!byWeek[wk])byWeek[wk]=[];
    byWeek[wk].push(t);
  });
  
  // Sort within each week by relevance, then by dateStart
  Object.keys(byWeek).forEach(wk=>{
    byWeek[wk].sort((a,b)=>{
      const ra=tierRank(a), rb=tierRank(b);
      if(ra!==rb) return ra-rb;
      return a.dateStart.localeCompare(b.dateStart);
    });
  });
  
  let html='';
  Object.keys(byWeek).sort().forEach(wk=>{
    const items=byWeek[wk];
    html+=`<div class="month-group"><div class="month-label"><span class="wk-range">${fmtWeekGroup(wk)}</span><span class="wk-count">${items.length} torneio${items.length!==1?'s':''}</span></div>`;
    items.forEach(t=>{html+=renderCard(t);});
    html+='</div>';
  });
  el.innerHTML=html;
}

<div class="t-date-col"><div class="t-day" style="color:${col}">${startDay(t.dateStart)}</div><div class="t-mon">${startMon(t.dateStart)}</div></div>
<div class="t-info"><div class="t-name">${t.name}</div><div class="t-loc"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${t.city}, ${t.country}</div>
<div class="t-badges"><span class="badge badge-${t.tier}">${TIER_LABEL[t.tier]||t.tier}</span>${pts}${xb}</div></div>
<div class="t-right"><button class="star-btn${u.starred?' on':''}" onclick="toggleStar(event,'${t.id}')">${u.starred?'★':'☆'}</button><div class="t-daterange">${d(t.dateStart)}<br>→ ${d(t.dateEnd)}</div></div>
</div>
${isOpen?renderExpanded(t,u):''}
</div>`;}
 
function renderExpanded(t,u){
  const rounds=getRounds(t.tier);
  const results=u.results||{};
  const partner=u.partner||'';
  
  // Build rounds HTML
  let roundsHtml='';
  let lastSection='';
  rounds.forEach(({r,q})=>{
    const section=q?'QUALIFYING':'QUADRO PRINCIPAL';
    if(section!==lastSection){
      roundsHtml+=`<div class="round-sep">${section}</div>`;
      lastSection=section;
    }
    const res=results[r]||{};
    const hasResult=!!(res.result);
    const isWin=hasResult&&isWinResult(res.result);
    const openKey=`${t.id}_${r}`;
    const isRoundOpen=openRoundKey===openKey;
    roundsHtml+=`<div class="round-row${hasResult?' has-result':''}${hasResult?(isWin?' is-win':' is-loss'):''}">
<div class="round-header">
  <span class="round-label${q?' qual-round':''}">${r}</span>
  ${hasResult?(()=>{const wc=isWin?'var(--gold-t)':'var(--major)';const opp2str=res.opp2?' / '+res.opp2:'';return `<span class="round-result-display">${res.opp1||''}${opp2str} <b style="color:${wc}">${res.result}</b></span>`;})():'<span class="round-result-display" style="color:var(--muted)">— sem resultado —</span>'}
  <button class="round-edit-btn" onclick="toggleRoundEdit('${t.id}','${r}',event)">${isRoundOpen?'✕':'✎'}</button>
</div>
${isRoundOpen?`<div class="round-inputs">
  <input class="round-input" placeholder="Adversário 1 (ex: S. Esteban Barroso)" value="${res.opp1||''}" 
    id="ri_opp1_${t.id}_${r}" autocomplete="off">
  <input class="round-input" placeholder="Adversário 2 (ex: L. Miranda Santos)" value="${res.opp2||''}" 
    id="ri_opp2_${t.id}_${r}" autocomplete="off">
  <input class="round-input full" placeholder="Resultado (ex: 4-6 6-1 6-4)" value="${res.result||''}" 
    id="ri_res_${t.id}_${r}" autocomplete="off">
  <button class="round-save-btn" onclick="saveRound('${t.id}','${r}')">Guardar</button>
</div>`:''}
</div>`;
  });
 
  return `<div class="t-expanded">
<div class="exp-grid">
<div class="exp-field"><label>Vou jogar?</label>
<select class="exp-select" onchange="setStatus('${t.id}',this.value)">
<option value="" ${!u.status?'selected':''}>— decidir —</option>
<option value="confirmado" ${u.status==='confirmado'?'selected':''}>✓ Confirmado</option>
<option value="tentativo" ${u.status==='tentativo'?'selected':''}>? Tentativo</option>
<option value="nao-vou" ${u.status==='nao-vou'?'selected':''}>✗ Não vou</option>
</select></div>
<div class="exp-field"><label>Parceiro</label>
<input class="exp-input" type="text" placeholder="ex: Fazendeiro" value="${u.partner||''}" onchange="setPartner('${t.id}',this.value)"></div>
</div>
<div class="dates-grid">
${t.qual?`<div class="date-pill qual"><div class="dp-lbl">QUALIFYING</div><div class="dp-val">${d(t.qual)}</div></div>`:`<div class="date-pill"><div class="dp-lbl">QUALIFYING</div><div class="dp-val">—</div></div>`}
<div class="date-pill draw"><div class="dp-lbl">QUADRO PRINC.</div><div class="dp-val">${d(t.draw||t.dateStart)}</div></div>
<div class="date-pill"><div class="dp-lbl">FIM</div><div class="dp-val">${d(t.dateEnd)}</div></div>
</div>
<div class="res-section">
  <div class="res-section-title"><span>RESULTADOS</span></div>
  <div class="res-partner-row">
    <label>PAR</label>
    <input class="res-partner-input" type="text" placeholder="ex: Fazendeiro" value="${partner}"
      onchange="setPartner('${t.id}',this.value)" autocomplete="off">
  </div>
  <div class="res-prize-row">
    <label>PRIZE €</label>
    <input class="res-prize-input" type="number" min="0" step="1" placeholder="ex: 500" value="${u.prize||''}"
      onchange="setPrize('${t.id}',this.value)" autocomplete="off">
  </div>
  <div class="rounds-list">${roundsHtml}</div>
</div>
<textarea class="exp-notes" placeholder="Notas — hotel, voo, contactos..." onchange="setNotes('${t.id}',this.value)">${u.notes||''}</textarea>
<div class="exp-actions">
<button class="btn-edit" onclick="openEditModal('${t.id}')">✎ Editar</button>
<button class="btn-del" onclick="askDelete('${t.id}')">🗑 Apagar</button>
</div></div>`;}
 
 
const TIER_ROUNDS = {
  major:    {qual:['Q1','Q2','Last Q'], main:['R64','R32','R16','QF','SF','F']},
  p1:       {qual:['Q1','Q2','Last Q'], main:['R64','R32','R16','QF','SF','F']},
  p2:       {qual:['Q1','Last Q'],      main:['R32','R16','QF','SF','F']},
  platinum: {qual:['Q1','Q2','Last Q'], main:['R32','R16','QF','SF','F']},
  gold:     {qual:['Q1','Q2','Last Q'], main:['R32','R16','QF','SF','F']},
  silver:   {qual:['Q1','Q2','Last Q'], main:['R32','R16','QF','SF','F']},
  bronze:   {qual:['Q1','Q2','Last Q'], main:['R32','R16','QF','SF','F']},
  fpp:      {qual:['Q1','Last Q'],      main:['R64','R32','R16','QF','SF','F']},
  nat:      {qual:['Q1','Last Q'],      main:['R64','R32','R16','QF','SF','F']},
  champ:    {qual:[],                   main:['R32','R16','QF','SF','F']},
};
function getRounds(tier){
  const r=TIER_ROUNDS[tier]||TIER_ROUNDS.bronze;
  return [...r.qual.map(x=>({r:x,q:true})),...r.main.map(x=>({r:x,q:false}))];
}
 
// ROUND RESULTS
let openRoundKey=null;
 
function isWinResult(result){
  if(!result) return false;
  const sets=result.trim().split(/\s+/);
  let wins=0,losses=0;
  sets.forEach(s=>{
    const p=s.split('-');
    if(p.length===2){
      const a=parseInt(p[0]),b=parseInt(p[1]);
      if(!isNaN(a)&&!isNaN(b)){if(a>b)wins++;else losses++;}
    }
  });
  return wins>losses;
}
 
function toggleRoundEdit(tid,round,e){
  e.stopPropagation();
  const key=tid+'_'+round;
  openRoundKey=openRoundKey===key?null:key;
  renderList();
  setTimeout(()=>{
    const el=document.getElementById('ri_res_'+tid+'_'+round);
    if(el) el.focus();
  },50);
}
 
function saveRound(tid,round){
  const opp1=(document.getElementById('ri_opp1_'+tid+'_'+round)||{}).value||'';
  const opp2=(document.getElementById('ri_opp2_'+tid+'_'+round)||{}).value||'';
  const result=(document.getElementById('ri_res_'+tid+'_'+round)||{}).value||'';
  if(!userData[tid]) userData[tid]={};
  if(!userData[tid].results) userData[tid].results={};
  userData[tid].results[round]={opp1:opp1.trim(),opp2:opp2.trim(),result:result.trim()};
  openRoundKey=null;
  saveToStorage();
  renderList();
  toast('✓ Resultado guardado');
}
 
// OPPONENT SEARCH
function openSearchPage(){
  document.getElementById('searchPage').classList.add('show');
  setTimeout(()=>document.getElementById('oppSearchInput').focus(),200);
}
function closeSearchPage(){
  document.getElementById('searchPage').classList.remove('show');
  document.getElementById('oppSearchInput').value='';
  document.getElementById('oppResults').innerHTML='<div class="empty" style="padding-top:40px"><big style="font-size:30px">🔍</big>Escreve um nome para pesquisar</div>';
}
 
function searchOpponent(q){
  q=q.toLowerCase().trim();
  const el=document.getElementById('oppResults');
  if(q.length<2){el.innerHTML='<div class="empty" style="padding-top:40px"><big style="font-size:30px">🔍</big>Escreve pelo menos 2 letras</div>';return;}
  
  // Collect all matches
  const matches=[];
  tournaments.forEach(t=>{
    const u=getU(t.id);
    if(!u.results) return;
    Object.entries(u.results).forEach(([round,res])=>{
      if(!res.result) return;
      const opp1=(res.opp1||'').toLowerCase();
      const opp2=(res.opp2||'').toLowerCase();
      if(opp1.includes(q)||opp2.includes(q)){
        matches.push({t,round,res,u});
      }
    });
  });
 
  if(!matches.length){el.innerHTML='<div class="empty" style="padding-top:40px"><big style="font-size:30px">🎾</big>Nenhum resultado encontrado</div>';return;}
 
  // Group by opponent name
  const byOpp={};
  matches.forEach(m=>{
    const opp1=(m.res.opp1||'').toLowerCase();
    const opp2=(m.res.opp2||'').toLowerCase();
    const key=opp1.includes(q)?m.res.opp1:m.res.opp2;
    const normKey=key.toLowerCase();
    if(!byOpp[normKey]) byOpp[normKey]={name:key,matches:[]};
    byOpp[normKey].matches.push(m);
  });
 
  let html='';
  Object.values(byOpp).forEach(({name,matches})=>{
    const wins=matches.filter(m=>isWinResult(m.res.result)).length;
    const losses=matches.length-wins;
    html+=`<div class="opp-group">
<div class="opp-name">${name}</div>
<div class="opp-stats">${matches.length} jogo${matches.length!==1?'s':''} · <span style="color:var(--gold-t)">${wins}V</span> <span style="color:var(--major)">${losses}D</span></div>`;
    matches.sort((a,b)=>b.t.dateStart.localeCompare(a.t.dateStart)).forEach(m=>{
      const win=isWinResult(m.res.result);
      const opp=m.res.opp1&&m.res.opp2?m.res.opp1+' / '+m.res.opp2:(m.res.opp1||m.res.opp2||'');
      const partnerStr=m.u.partner?` (c/ ${m.u.partner})`:'';
      html+=`<div class="opp-match ${win?'win':'loss'}">
<div class="opp-match-top">
  <div class="opp-match-tourn">${m.t.name}</div>
  <div class="opp-match-result ${win?'win':'loss'}">${m.res.result}</div>
</div>
<div class="opp-match-detail">${m.round} · ${d(m.t.dateStart)} · ${m.t.city}${partnerStr}</div>
<div class="opp-match-detail" style="margin-top:2px">vs ${opp}</div>
</div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}
 
// INTERACTIONS
function toggleCard(id){openCardId=openCardId===id?null:id;renderList();if(openCardId){setTimeout(()=>{const e=document.getElementById('card-'+id);if(e)e.scrollIntoView({behavior:'smooth',block:'nearest'});},40);}}
function toggleStar(e,id){e.stopPropagation();const on=!getU(id).starred;setU(id,'starred',on);renderList();renderStats();toast(on?'⭐ Favorito':'Removido');}
function setStatus(id,v){setUObj(id,{status:v});renderList();renderStats();}
function setPartner(id,v){setU(id,'partner',v.trim());renderList();}
function setPrize(id,v){const n=parseFloat(v);setU(id,'prize',isNaN(n)?null:n);renderList();renderStats();}
function setNotes(id,v){setU(id,'notes',v);}
function setYear(y,el){activeYear=y;document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');openCardId=null;activeWeekMonday=null;updateWeekUI();renderStats();renderList();}
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderList();}
 
// MODAL
function openAddModal(){editingId=null;document.getElementById('modalTitle').textContent='Adicionar Torneio';['mName','mCity','mNotes','mPartner'].forEach(id=>document.getElementById(id).value='');document.getElementById('mCountry').value='POR';document.getElementById('mTier').value='silver';document.getElementById('mPts').value='';document.getElementById('mStart').value=`${activeYear}-01-01`;document.getElementById('mEnd').value=`${activeYear}-01-03`;document.getElementById('mQual').value='';document.getElementById('mDraw').value=`${activeYear}-01-01`;document.getElementById('mStatus').value='';document.getElementById('modalOverlay').classList.add('show');}
function openEditModal(id){const t=tournaments.find(x=>x.id===id);if(!t)return;const u=getU(id);editingId=id;document.getElementById('modalTitle').textContent='Editar Torneio';document.getElementById('mName').value=t.name;document.getElementById('mCity').value=t.city;document.getElementById('mCountry').value=t.country;document.getElementById('mTier').value=t.tier;document.getElementById('mPts').value=t.pts||'';
document.getElementById('mStart').value=t.dateStart;document.getElementById('mEnd').value=t.dateEnd;document.getElementById('mQual').value=t.qual||'';
document.getElementById('mDraw').value=t.draw||'';
document.getElementById('mPartner').value=u.partner||'';
document.getElementById('mStatus').value=u.status||'';
document.getElementById('mNotes').value=u.notes||'';
document.getElementById('modalOverlay').classList.add('show');}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('show');}
function saveModal(){
  const name=document.getElementById('mName').value.trim();
  const dateStart=document.getElementById('mStart').value;
  if(!name||!dateStart){toast('⚠️ Nome e data obrigatórios');return;}
  const obj={name,city:document.getElementById('mCity').value.trim()||'—',country:document.getElementById('mCountry').value.trim()||'—',tier:document.getElementById('mTier').value,pts:parseInt(document.getElementById('mPts').value)||0,dateStart,dateEnd:document.getElementById('mEnd').value||dateStart,qual:document.getElementById('mQual').value||null,draw:document.getElementById('mDraw').value||dateStart,y:activeYear,custom:true};
  const partner=document.getElementById('mPartner').value.trim();
  const status=document.getElementById('mStatus').value;
  const notes=document.getElementById('mNotes').value;
  if(editingId){
    const idx=userTournaments.findIndex(x=>x.id===editingId);
    if(idx>=0)Object.assign(userTournaments[idx],obj,{id:editingId});
    else{const t=tournaments.find(x=>x.id===editingId);if(t)Object.assign(t,obj,{id:editingId});}
    if(partner||status||notes)userData[editingId]={...userData[editingId],partner,status,notes};
    toast('✓ Atualizado');
  }else{
    const newId=uid();obj.id=newId;obj.fpp=isPOR(obj);
    userTournaments.push(obj);
    if(partner||status||notes)userData[newId]={partner,status,notes};
    toast('✓ Adicionado');
  }
  saveToStorage();rebuildList();renderStats();renderList();closeModalDirect();
}
 
// DELETE
function askDelete(id){const t=tournaments.find(x=>x.id===id);deleteTargetId=id;const isBase=BASE.find(x=>x.id===id);document.getElementById('confirmMsg').textContent=isBase?`Repor "${t.name}" para valores originais?`:`Apagar "${t.name}"?`;document.getElementById('confirmBox').classList.add('show');}
function closeConfirm(){document.getElementById('confirmBox').classList.remove('show');deleteTargetId=null;}
function confirmDelete(){if(!deleteTargetId){closeConfirm();return;}const id=deleteTargetId;const isBase=BASE.find(x=>x.id===id);if(isBase){delete userData[id];const t=tournaments.find(x=>x.id===id);if(t)Object.assign(t,isBase);toast('Reposto');}else{userTournaments=userTournaments.filter(x=>x.id!==id);delete userData[id];toast('Apagado');}saveToStorage();rebuildList();renderStats();renderList();openCardId=null;closeConfirm();}
 
// REFRESH / SYNC
async function doRefresh(){const btn=document.getElementById('btnRefresh');btn.classList.add('spinning');btn.disabled=true;toast('🔄 A atualizar...');await new Promise(r=>setTimeout(r,1200));rebuildList();renderStats();renderList();btn.classList.remove('spinning');btn.disabled=false;toast('✓ Calendário atualizado — '+new Date().toLocaleDateString('pt-PT'));}
async function doSync(){setSyncStatus('syncing','A sincronizar...');toast('🔄 A sincronizar...');await saveToStorage();toast('✓ Sincronizado');}
 
// EXCEL EXPORT
function exportExcel(){
  const list = filteredList();
  if(!list.length){toast('Nenhum torneio para exportar');return;}
  
  const rows = [
    ['Favorito','Nome','Cidade','País','Categoria','Pontos FIP','Início','Fim','Qualifying','Quadro Principal','Estado','Parceiro','Prize €','FPP','Notas']
  ];
  
  list.forEach(t => {
    const u = getU(t.id);
    const tierLabels = {major:'Major',p1:'P1',p2:'P2',platinum:'Platinum',gold:'Gold',silver:'Silver',bronze:'Bronze',fpp:'FPP',nat:'Nacional FPP',champ:'Campeonato'};
    rows.push([
      u.starred ? 'Sim' : '',
      t.name,
      t.city,
      t.country,
      tierLabels[t.tier] || t.tier,
      t.pts || '',
      t.dateStart,
      t.dateEnd,
      t.qual || '',
      t.draw || t.dateStart,
      u.status === 'confirmado' ? 'Confirmado' : u.status === 'tentativo' ? 'Tentativo' : u.status === 'nao-vou' ? 'Não vou' : '',
      u.partner || '',
      u.prize || '',
      t.fpp ? 'Sim' : '',
      u.notes || ''
    ]);
  });
 
  // Build CSV with BOM for Excel UTF-8
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => 
    r.map(cell => {
      const s = String(cell === null || cell === undefined ? '' : cell);
      return s.includes(',') || s.includes('"') || s.includes('\n') 
        ? '"' + s.replace(/"/g, '""') + '"' 
        : s;
    }).join(';')  // semicolon for European Excel
  ).join('\r\n');
 
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const filterName = activeFilter === 'all' ? 'todos' : activeFilter;
  const weekStr = activeWeekMonday ? '-semana' : '';
  a.href = url;
  a.download = 'pepi-circuit-' + activeYear + '-' + filterName + weekStr + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ Excel exportado — ' + list.length + ' torneios');
}
 
// TOAST
let toastT;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),2400);}
 
// INIT
setSyncStatus('syncing','A carregar...');
loadFromStorage();
