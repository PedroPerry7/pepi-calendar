<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pepi 25-26">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Pepi — Circuit 2025·2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --bg2:#111625; --bg3:#1a2035; --bg4:#202840;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13); --border3:rgba(255,255,255,0.22);
  --gold:#e4c060; --gold2:#f0d080;
  --text:#e8eaf0; --muted:#6a7290; --muted2:#8a94b0;
  --major:#e85d75; --p1:#e87d3a; --p2:#e8b53a;
  --platinum:#7ecfff; --gold-t:#4ec4a0; --silver:#90a0c0; --bronze:#c07840;
  --fpp:#a07af0; --nat:#60b87a; --champ:#e060c0;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100svh;overscroll-behavior:none}

/* ── HEADER ── */
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 14px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);line-height:1}
.logo span{color:var(--muted2);font-size:12px;font-family:'DM Mono',monospace;display:block;letter-spacing:1px;margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-icon{background:var(--bg3);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.btn-icon:active{transform:scale(0.93);background:var(--bg4)}
.btn-icon svg{width:16px;height:16px}
.btn-refresh.spinning svg{animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── YEAR TABS ── */
.year-tabs{display:flex;gap:6px;margin-bottom:10px}
.year-tab{flex:1;padding:6px 0;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center}
.year-tab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500}

/* ── FILTERS ── */
.filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.filter-btn.active{color:#000;border-color:transparent;font-weight:500}
.filter-btn[data-f="all"].active{background:var(--gold);color:#000}
.filter-btn[data-f="starred"].active{background:#e85d75}
.filter-btn[data-f="major"].active{background:var(--major)}
.filter-btn[data-f="p1"].active{background:var(--p1)}
.filter-btn[data-f="p2"].active{background:var(--p2);color:#000}
.filter-btn[data-f="platinum"].active{background:var(--platinum);color:#000}
.filter-btn[data-f="gold"].active{background:var(--gold-t);color:#000}
.filter-btn[data-f="silver"].active{background:var(--silver);color:#000}
.filter-btn[data-f="bronze"].active{background:var(--bronze)}
.filter-btn[data-f="fpp"].active{background:var(--fpp)}
.filter-btn[data-f="nat"].active{background:var(--nat);color:#000}
.filter-btn[data-f="por"].active{background:#c84040}
.filter-btn[data-f="confirmado"].active{background:var(--gold-t);color:#000}

/* ── STATS ── */
.stats-bar{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;text-align:center;padding:8px 14px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--gold)}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}

/* ── SEARCH ── */
.search-wrap{padding:10px 12px 0;position:relative}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 14px 9px 36px;outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* ── CONTENT ── */
.content{padding:10px 10px calc(var(--safe-bottom) + 80px)}
.month-group{margin-bottom:4px}
.month-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);padding:14px 4px 6px;position:sticky;top:calc(var(--safe-top) + 158px);background:var(--bg);z-index:10}

/* ── CARD ── */
.t-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden;transition:border-color 0.2s}
.t-card.is-starred{border-color:rgba(228,192,96,0.35)}
.t-card.is-past{opacity:0.38}
.t-card.is-custom{border-style:dashed}

.t-main{display:flex;align-items:stretch;cursor:pointer;padding:11px 12px;gap:10px;position:relative}
.t-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;margin:-11px 0 -11px -12px}

.t-date-col{flex-shrink:0;text-align:center;min-width:38px}
.t-day{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.t-mon{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

.t-info{flex:1;min-width:0}
.t-name{font-weight:500;font-size:13px;line-height:1.3;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-loc{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:3px;margin-bottom:4px}
.t-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.badge-major{background:rgba(232,93,117,0.18);color:var(--major)}
.badge-p1{background:rgba(232,125,58,0.18);color:var(--p1)}
.badge-p2{background:rgba(232,181,58,0.18);color:var(--p2)}
.badge-platinum{background:rgba(126,207,255,0.13);color:var(--platinum)}
.badge-gold{background:rgba(78,196,160,0.13);color:var(--gold-t)}
.badge-silver{background:rgba(144,160,192,0.13);color:var(--silver)}
.badge-bronze{background:rgba(192,120,64,0.18);color:var(--bronze)}
.badge-fpp{background:rgba(160,122,240,0.18);color:var(--fpp)}
.badge-nat{background:rgba(96,184,122,0.15);color:var(--nat)}
.badge-champ{background:rgba(224,96,192,0.15);color:var(--champ)}
.badge-pts{background:rgba(228,192,96,0.1);color:var(--gold)}
.badge-go{background:rgba(78,196,160,0.18);color:var(--gold-t)}
.badge-maybe{background:rgba(232,181,58,0.15);color:var(--p2)}
.badge-no{background:rgba(106,114,144,0.15);color:var(--muted2)}
.badge-partner{background:rgba(228,192,96,0.08);color:var(--gold);border:1px solid rgba(228,192,96,0.2)}
.badge-por{background:rgba(200,64,64,0.18);color:#e07070}
.badge-custom{background:rgba(160,122,240,0.1);color:var(--fpp);border:1px dashed rgba(160,122,240,0.3)}

.t-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:4px}
.star-btn{background:none;border:none;cursor:pointer;padding:2px;color:var(--muted);font-size:17px;line-height:1;transition:color 0.15s,transform 0.15s}
.star-btn.on{color:var(--gold)}
.star-btn:active{transform:scale(1.3)}
.t-daterange{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:right;line-height:1.5}

/* ── EXPANDED ── */
.t-expanded{display:none;border-top:1px solid var(--border);background:var(--bg3);padding:12px}
.t-card.open .t-expanded{display:block}
.t-card.open .t-main{background:rgba(255,255,255,0.015)}

.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.exp-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.exp-select,.exp-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.exp-select:focus,.exp-input:focus{border-color:var(--gold)}
.exp-select option{background:var(--bg2)}

.dates-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.date-pill{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 8px}
.date-pill.qual{border-color:rgba(126,207,255,0.25)}
.date-pill.qual .dp-lbl{color:var(--platinum)}
.date-pill.draw{border-color:rgba(232,181,58,0.25)}
.date-pill.draw .dp-lbl{color:var(--p2)}
.dp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px}
.dp-val{font-size:12px;font-weight:500}

.exp-notes{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;resize:none;min-height:50px;transition:border-color 0.15s;margin-top:4px}
.exp-notes:focus{border-color:var(--gold)}
.exp-notes::placeholder{color:var(--muted)}

.exp-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.btn-edit,.btn-del{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-edit:active{background:var(--bg4)}
.btn-del{color:#e07070;border-color:rgba(224,112,112,0.25)}
.btn-del:active{background:rgba(224,112,112,0.1)}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--safe-bottom) + 20px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(228,192,96,0.35);z-index:50;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}
.fab svg{width:22px;height:22px;color:#000}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px 16px calc(var(--safe-bottom) + 20px);width:100%;max-height:92svh;overflow-y:auto;transform:translateY(40px);transition:transform 0.25s cubic-bezier(0.34,1.2,0.64,1)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;padding:2px;line-height:1}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-field{margin-bottom:0}
.modal-field.full{grid-column:1/-1}
.modal-field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.modal-input,.modal-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.modal-input:focus,.modal-select:focus{border-color:var(--gold)}
.modal-select option{background:var(--bg3)}
.btn-save{width:100%;padding:13px;background:var(--gold);border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;transition:opacity 0.15s}
.btn-save:active{opacity:0.85}

/* ── SYNC INDICATOR ── */
.sync-row{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync-dot.synced{background:var(--gold-t)}
.sync-dot.syncing{background:var(--p2);animation:pulse 1s infinite}
.sync-dot.error{background:var(--major)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 16px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;transition:transform 0.28s cubic-bezier(0.34,1.3,0.64,1);z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty big{font-family:'Bebas Neue',sans-serif;font-size:36px;display:block;margin-bottom:6px;color:var(--border2)}

/* ── CONFIRM ── */
.confirm-box{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.15s}
.confirm-box.show{opacity:1;pointer-events:all}
.confirm-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;max-width:300px;width:100%;text-align:center}
.confirm-inner p{font-size:14px;color:var(--text);margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.confirm-btns .btn-confirm-del{background:rgba(200,64,64,0.2);color:#e07070;border-color:rgba(200,64,64,0.3)}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="logo">PEPI<span>CIRCUIT 2025 · 2026</span></div>
    <div class="header-actions">
      <button class="btn-icon btn-refresh" id="btnRefresh" title="Atualizar" onclick="doRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
      <button class="btn-icon" title="Sincronizar" onclick="doSync()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/><path d="M2 12h4M18 12h4M12 2v4M12 18v4"/></svg>
      </button>
    </div>
  </div>
  <div class="year-tabs">
    <button class="year-tab" data-y="2025" onclick="setYear(2025,this)">2025</button>
    <button class="year-tab active" data-y="2026" onclick="setYear(2026,this)">2026</button>
  </div>
  <div class="filters" id="filtersBar">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" data-f="starred" onclick="setFilter('starred',this)">⭐ Meus</button>
    <button class="filter-btn" data-f="confirmado" onclick="setFilter('confirmado',this)">✓ Go</button>
    <button class="filter-btn" data-f="por" onclick="setFilter('por',this)">🇵🇹 Portugal</button>
    <button class="filter-btn" data-f="major" onclick="setFilter('major',this)">Major</button>
    <button class="filter-btn" data-f="p1" onclick="setFilter('p1',this)">P1</button>
    <button class="filter-btn" data-f="p2" onclick="setFilter('p2',this)">P2</button>
    <button class="filter-btn" data-f="platinum" onclick="setFilter('platinum',this)">Platinum</button>
    <button class="filter-btn" data-f="gold" onclick="setFilter('gold',this)">Gold</button>
    <button class="filter-btn" data-f="silver" onclick="setFilter('silver',this)">Silver</button>
    <button class="filter-btn" data-f="bronze" onclick="setFilter('bronze',this)">Bronze</button>
    <button class="filter-btn" data-f="fpp" onclick="setFilter('fpp',this)">FPP</button>
    <button class="filter-btn" data-f="nat" onclick="setFilter('nat',this)">Nac.</button>
  </div>
</header>

<div class="sync-row">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncLabel">A carregar dados...</span>
</div>
<div class="stats-bar" id="statsBar"></div>
<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input class="search-input" type="search" id="searchInput" placeholder="Pesquisar torneio, cidade, país..." oninput="renderList()">
</div>
<div class="content" id="mainContent"></div>

<button class="fab" onclick="openAddModal()" title="Adicionar torneio">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title">
      <span id="modalTitle">Adicionar Torneio</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-grid">
      <div class="modal-field full">
        <label>Nome do Torneio</label>
        <input class="modal-input" id="mName" type="text" placeholder="ex: FIP Gold Paredes">
      </div>
      <div class="modal-field">
        <label>Cidade</label>
        <input class="modal-input" id="mCity" type="text" placeholder="ex: Paredes">
      </div>
      <div class="modal-field">
        <label>País (sigla)</label>
        <input class="modal-input" id="mCountry" type="text" placeholder="ex: POR" maxlength="5">
      </div>
      <div class="modal-field">
        <label>Categoria</label>
        <select class="modal-select" id="mTier">
          <option value="major">Major</option>
          <option value="p1">P1</option>
          <option value="p2">P2</option>
          <option value="platinum">Platinum</option>
          <option value="gold">Gold</option>
          <option value="silver" selected>Silver</option>
          <option value="bronze">Bronze</option>
          <option value="fpp">FPP</option>
          <option value="nat">Nacional FPP</option>
          <option value="champ">Campeonato</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Pontos FIP</label>
        <input class="modal-input" id="mPts" type="number" placeholder="ex: 300" min="0">
      </div>
      <div class="modal-field">
        <label>Início (AAAA-MM-DD)</label>
        <input class="modal-input" id="mStart" type="date">
      </div>
      <div class="modal-field">
        <label>Fim (AAAA-MM-DD)</label>
        <input class="modal-input" id="mEnd" type="date">
      </div>
      <div class="modal-field">
        <label>Qualifying (AAAA-MM-DD)</label>
        <input class="modal-input" id="mQual" type="date" placeholder="Opcional">
      </div>
      <div class="modal-field">
        <label>Quadro Principal</label>
        <input class="modal-input" id="mDraw" type="date">
      </div>
      <div class="modal-field full">
        <label>Parceiro</label>
        <input class="modal-input" id="mPartner" type="text" placeholder="ex: Fazendeiro">
      </div>
      <div class="modal-field full">
        <label>Estado</label>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let tournaments = [...BASE];
let userTournaments = [];   // custom added
let userData = {};          // per-tournament user data
let activeYear = 2026;
let activeFilter = 'all';
let openCardId = null;
let editingId = null;
let deleteTargetId = null;

// ═══════════════════════════════════════════════════
//  PERSISTENT STORAGE (Claude artifact storage — syncs across devices)
// ═══════════════════════════════════════════════════
async function loadFromStorage(){
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if(r && r.value){
      const d = JSON.parse(r.value);
      userData = d.userData || {};
      userTournaments = d.userTournaments || [];
    }
  } catch(e){ loadLocalFallback(); }
  setSyncStatus('synced','Sincronizado');
  rebuildList(); renderStats(); renderList();
}
async function saveToStorage(){
  setSyncStatus('syncing','A sincronizar...');
  const payload = JSON.stringify({ userData, userTournaments, savedAt: new Date().toISOString() });
  try {
    await window.storage.set(STORAGE_KEY, payload);
    setSyncStatus('synced','Sincronizado — '+new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}));
    saveLocalFallback();
  } catch(e){
    setSyncStatus('error','Erro de sincronização');
    saveLocalFallback();
  }
}
function loadLocalFallback(){
  try{ const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); userData=d.userData||{}; userTournaments=d.userTournaments||[]; }catch(e){}
}
function saveLocalFallback(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({userData,userTournaments})); }catch(e){}
}
function setSyncStatus(state, msg){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  dot.className='sync-dot '+state;
  lbl.textContent=msg;
}

function getU(id){ return userData[id]||{}; }
function setU(id,key,val){ if(!userData[id])userData[id]={}; userData[id][key]=val; saveToStorage(); }
function setUObj(id,obj){ userData[id]={...(userData[id]||{}),...obj}; saveToStorage(); }

// ═══════════════════════════════════════════════════
//  LIST MANAGEMENT
// ═══════════════════════════════════════════════════
function rebuildList(){
  tournaments = [...BASE, ...userTournaments];
}

function filteredList(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return tournaments.filter(t=>{
    if(t.y !== activeYear) return false;
    if(q && !t.name.toLowerCase().includes(q) && !t.city.toLowerCase().includes(q) && !t.country.toLowerCase().includes(q)) return false;
    const u = getU(t.id);
    if(activeFilter==='all') return true;
    if(activeFilter==='starred') return u.starred;
    if(activeFilter==='confirmado') return u.status==='confirmado';
    if(activeFilter==='por') return isPOR(t);
    if(activeFilter==='fpp') return t.fpp||t.tier==='fpp'||t.tier==='nat';
    if(activeFilter==='nat') return t.tier==='nat'||t.tier==='champ';
    return t.tier===activeFilter;
  });
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function renderStats(){
  const all = tournaments.filter(t=>t.y===activeYear);
  const confirmed = all.filter(t=>getU(t.id).status==='confirmado').length;
  const starred   = all.filter(t=>getU(t.id).starred).length;
  const pp = all.filter(t=>['major','p1','p2'].includes(t.tier)).length;
  const fipT = all.filter(t=>['platinum','gold','silver','bronze'].includes(t.tier)).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--p1)">${pp}</div><div class="stat-l">Premier</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--platinum)">${fipT}</div><div class="stat-l">FIP Tour</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--gold-t)">${confirmed}</div><div class="stat-l">Confirmados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--gold)">${starred}</div><div class="stat-l">⭐ Meus</div></div>`;
}

function renderList(){
  const list = filteredList();
  const el = document.getElementById('mainContent');
  if(!list.length){ el.innerHTML='<div class="empty"><big>🎾</big>Nenhum torneio encontrado</div>'; return; }
  const byMonth={};
  list.forEach(t=>{ const m=getMonthIdx(t.dateStart); if(!byMonth[m])byMonth[m]=[]; byMonth[m].push(t); });
  let html='';
  Object.keys(byMonth).sort((a,b)=>+a-+b).forEach(mk=>{
    html+=`<div class="month-group"><div class="month-label">${MONTHSF[mk].toUpperCase()}</div>`;
    byMonth[mk].forEach(t=>{ html+=renderCard(t); });
    html+='</div>';
  });
  el.innerHTML=html;
}

function renderCard(t){
  const u=getU(t.id);
  const isOpen=openCardId===t.id;
  const past=isPast(t)&&!u.starred&&u.status!=='confirmado';
  const col=`var(${TIER_COL[t.tier]||'--muted'})`;
  const isCustom=!!t.custom;

  let extraBadges='';
  if(u.partner) extraBadges+=`<span class="badge badge-partner">👤 ${u.partner}</span>`;
  if(u.status==='confirmado') extraBadges+=`<span class="badge badge-go">✓ GO</span>`;
  else if(u.status==='tentativo') extraBadges+=`<span class="badge badge-maybe">? Talvez</span>`;
  else if(u.status==='nao-vou') extraBadges+=`<span class="badge badge-no">✗ Não vou</span>`;
  if(t.fpp&&!['fpp','nat'].includes(t.tier)) extraBadges+=`<span class="badge badge-fpp">FPP</span>`;
  if(isPOR(t)) extraBadges+=`<span class="badge badge-por">🇵🇹</span>`;
  if(isCustom) extraBadges+=`<span class="badge badge-custom">✎ custom</span>`;

  const ptsStr = t.pts ? `<span class="badge badge-pts">${t.pts}pts</span>` : '';

  return `<div class="t-card${isOpen?' open':''}${u.starred?' is-starred':''}${past?' is-past':''}${isCustom?' is-custom':''}" id="card-${t.id}">
  <div class="t-main" onclick="toggleCard('${t.id}')">
    <div class="t-stripe" style="background:${col}"></div>
    <div class="t-date-col">
      <div class="t-day" style="color:${col}">${startDay(t.dateStart)}</div>
      <div class="t-mon">${startMon(t.dateStart)}</div>
    </div>
    <div class="t-info">
      <div class="t-name">${t.name}</div>
      <div class="t-loc"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${t.city}, ${t.country}</div>
      <div class="t-badges"><span class="badge badge-${t.tier}">${TIER_LABEL[t.tier]||t.tier.toUpperCase()}</span>${ptsStr}${extraBadges}</div>
    </div>
    <div class="t-right">
      <button class="star-btn${u.starred?' on':''}" onclick="toggleStar(event,'${t.id}')">${u.starred?'★':'☆'}</button>
      <div class="t-daterange">${fmt(t.dateStart)}<br>→ ${fmt(t.dateEnd)}</div>
    </div>
  </div>
  ${isOpen ? renderExpanded(t,u) : ''}
</div>`;
}

function renderExpanded(t,u){
  return `<div class="t-expanded">
  <div class="exp-grid">
    <div class="exp-field">
      <label>Vou jogar?</label>
      <select class="exp-select" onchange="setStatus('${t.id}',this.value)">
        <option value="" ${!u.status?'selected':''}>— decidir —</option>
        <option value="confirmado" ${u.status==='confirmado'?'selected':''}>✓ Confirmado</option>
        <option value="tentativo" ${u.status==='tentativo'?'selected':''}>? Tentativo</option>
        <option value="nao-vou" ${u.status==='nao-vou'?'selected':''}>✗ Não vou</option>
      </select>
    </div>
    <div class="exp-field">
      <label>Parceiro</label>
      <input class="exp-input" type="text" placeholder="ex: Fazendeiro" value="${u.partner||''}"
        onchange="setPartner('${t.id}',this.value)">
    </div>
  </div>
  <div class="dates-grid">
    ${t.qual?`<div class="date-pill qual"><div class="dp-lbl">QUALIFYING</div><div class="dp-val">${fmt(t.qual)}</div></div>`:'<div class="date-pill"><div class="dp-lbl">QUALIFYING</div><div class="dp-val">—</div></div>'}
    <div class="date-pill draw"><div class="dp-lbl">QUADRO PRINC.</div><div class="dp-val">${fmt(t.draw||t.dateStart)}</div></div>
    <div class="date-pill"><div class="dp-lbl">FIM</div><div class="dp-val">${fmt(t.dateEnd)}</div></div>
  </div>
  <textarea class="exp-notes" placeholder="Notas — hotel, voo, contactos..." onchange="setNotes('${t.id}',this.value)">${u.notes||''}</textarea>
  <div class="exp-actions">
    <button class="btn-edit" onclick="openEditModal('${t.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Editar
    </button>
    <button class="btn-del" onclick="askDelete('${t.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Apagar
    </button>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════
function toggleCard(id){
  openCardId = openCardId===id ? null : id;
  renderList();
  if(openCardId){ setTimeout(()=>{ const el=document.getElementById('card-'+id); if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'}); },40); }
}

function toggleStar(e,id){ e.stopPropagation(); const on=!getU(id).starred; setU(id,'starred',on); renderList(); renderStats(); toast(on?'⭐ Adicionado aos favoritos':'Removido dos favoritos'); }
function setStatus(id,val){ setUObj(id,{status:val}); renderList(); renderStats(); }
function setPartner(id,val){ setU(id,'partner',val.trim()); renderList(); }
function setNotes(id,val){ setU(id,'notes',val); }

function setYear(y,el){
  activeYear=y;
  document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  openCardId=null;
  renderStats(); renderList();
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ═══════════════════════════════════════════════════
//  ADD / EDIT MODAL
// ═══════════════════════════════════════════════════
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Adicionar Torneio';
  document.getElementById('mName').value='';
  document.getElementById('mCity').value='';
  document.getElementById('mCountry').value='POR';
  document.getElementById('mTier').value='silver';
  document.getElementById('mPts').value='';
  document.getElementById('mStart').value=`${activeYear}-01-01`;
  document.getElementById('mEnd').value=`${activeYear}-01-03`;
  document.getElementById('mQual').value='';
  document.getElementById('mDraw').value=`${activeYear}-01-01`;
  document.getElementById('mPartner').value='';
  document.getElementById('mStatus').value='';
  document.getElementById('mNotes').value='';
  document.getElementById('modalOverlay').classList.add('show');
}

function openEditModal(id){
  const t = tournaments.find(x=>x.id===id);
  if(!t)return;
  const u = getU(id);
  editingId=id;
  document.getElementById('modalTitle').textContent='Editar Torneio';
  document.getElementById('mName').value=t.name;
  document.getElementById('mCity').value=t.city;
  document.getElementById('mCountry').value=t.country;
  document.getElementById('mTier').value=t.tier;
  document.getElementById('mPts').value=t.pts||'';
  document.getElementById('mStart').value=t.dateStart;
  document.getElementById('mEnd').value=t.dateEnd;
  document.getElementById('mQual').value=t.qual||'';
  document.getElementById('mDraw').value=t.draw||'';
  document.getElementById('mPartner').value=u.partner||'';
  document.getElementById('mStatus').value=u.status||'';
  document.getElementById('mNotes').value=u.notes||'';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('show'); }

function saveModal(){
  const name = document.getElementById('mName').value.trim();
  const dateStart = document.getElementById('mStart').value;
  if(!name||!dateStart){ toast('⚠️ Nome e data de início obrigatórios'); return; }
  const obj={
    name, city:document.getElementById('mCity').value.trim()||'—',
    country:document.getElementById('mCountry').value.trim()||'—',
    tier:document.getElementById('mTier').value,
    pts:parseInt(document.getElementById('mPts').value)||0,
    dateStart, dateEnd:document.getElementById('mEnd').value||dateStart,
    qual:document.getElementById('mQual').value||null,
    draw:document.getElementById('mDraw').value||dateStart,
    y:activeYear, custom:true
  };
  const partner=document.getElementById('mPartner').value.trim();
  const status=document.getElementById('mStatus').value;
  const notes=document.getElementById('mNotes').value;

  if(editingId){
    // find and update
    const baseIdx=BASE.findIndex(x=>x.id===editingId);
    if(baseIdx>=0){
      // base tournament: store overrides in userData + separate override store
      if(!userData[editingId]) userData[editingId]={};
      Object.assign(userData[editingId],{_override:{...obj, id:editingId}, partner, status, notes});
      // apply to in-memory
      const t=tournaments.find(x=>x.id===editingId);
      if(t) Object.assign(t, obj, {id:editingId});
    } else {
      const idx=userTournaments.findIndex(x=>x.id===editingId);
      if(idx>=0) Object.assign(userTournaments[idx], obj, {id:editingId});
    }
    if(partner||status||notes) userData[editingId]={...userData[editingId],partner,status,notes};
    toast('✓ Torneio atualizado');
  } else {
    const newId=uid();
    obj.id=newId;
    obj.fpp=isPOR(obj)&&['silver','gold','platinum','bronze','fpp','nat'].includes(obj.tier);
    userTournaments.push(obj);
    if(partner||status||notes) userData[newId]={partner,status,notes};
    toast('✓ Torneio adicionado');
  }
  saveToStorage();
  rebuildList(); renderStats(); renderList();
  closeModalDirect();
}

// ═══════════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════════
function askDelete(id){
  const t=tournaments.find(x=>x.id===id);
  deleteTargetId=id;
  const baseItem=BASE.find(x=>x.id===id);
  document.getElementById('confirmMsg').textContent = baseItem
    ? `Repor "${t.name}" para os valores originais?`
    : `Apagar "${t.name}"? Esta ação não pode ser revertida.`;
  document.getElementById('confirmBox').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirmBox').classList.remove('show'); deleteTargetId=null; }
function confirmDelete(){
  if(!deleteTargetId){closeConfirm();return;}
  const id=deleteTargetId;
  const baseItem=BASE.find(x=>x.id===id);
  if(baseItem){
    // reset overrides
    delete userData[id];
    const t=tournaments.find(x=>x.id===id);
    if(t) Object.assign(t,baseItem);
    toast('Torneio reposto para valores originais');
  } else {
    userTournaments=userTournaments.filter(x=>x.id!==id);
    delete userData[id];
    toast('Torneio apagado');
  }
  saveToStorage(); rebuildList(); renderStats(); renderList();
  openCardId=null;
  closeConfirm();
}

// ═══════════════════════════════════════════════════
//  REFRESH
// ═══════════════════════════════════════════════════
async function doRefresh(){
  const btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning'); btn.disabled=true;
  toast('🔄 A verificar atualizações...');
  await new Promise(r=>setTimeout(r,1500));
  // Re-merge base with user overrides
  BASE.forEach(b=>{ const u=getU(b.id); if(u._override) Object.assign(b,u._override); });
  rebuildList(); renderStats(); renderList();
  btn.classList.remove('spinning'); btn.disabled=false;
  toast('✓ Calendário atualizado — '+new Date().toLocaleDateString('pt-PT'));
}

async function doSync(){
  setSyncStatus('syncing','A sincronizar...');
  toast('🔄 A sincronizar entre dispositivos...');
  await saveToStorage();
  toast('✓ Sincronizado com sucesso');
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
// Set current year tab active
document.querySelectorAll('.year-tab').forEach(b=>{ if(+b.dataset.y===activeYear) b.classList.add('active'); else b.classList.remove('active'); });
setSyncStatus('syncing','A carregar...');
loadFromStorage();
</script>
